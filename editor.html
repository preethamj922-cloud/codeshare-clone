<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ room_name }} - CodeShare</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="editor-body">
  <header class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand">&lt;/&gt; CodeShare</a>
      <span class="room-name" title="Room name">/{{ room_name }}</span>
    </div>

    <div class="topbar-center">
      <select id="language-select">
        {% for lang in languages %}
        <option value="{{ lang }}" {% if lang == language %}selected{% endif %}>
          {{ lang|capitalize }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="topbar-right">
      <span class="status-indicator" id="status-indicator">
        <span class="dot disconnected" id="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </span>
      <span class="user-count" id="user-count" title="Users in this room">
        👥 <span id="user-count-num">{{ user_count }}</span>
      </span>
      <button id="copy-link-btn" class="btn" title="Copy invite link">🔗 Copy Link</button>
      <button id="download-btn" class="btn" title="Download code">⬇ Download</button>
    </div>
  </header>

  <main id="editor-container"></main>

  <div id="toast" class="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    window.ROOM_NAME = {{ room_name|tojson }};
    window.INITIAL_CODE = {{ code|tojson }};
    window.INITIAL_LANGUAGE = {{ language|tojson }};
  </script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
